# Déploiement Railway. Build via le Dockerfile racine (universel).
# Healthcheck sur /api/health. Pour persister l'historique entre redéploiements,
# attacher un volume Railway monté sur /app/storage (sinon stockage éphémère).
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
