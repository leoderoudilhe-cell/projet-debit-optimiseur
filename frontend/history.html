<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique — Débit Optimiseur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .history-table { width: 100%; border-collapse: collapse; }
  .history-table th {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    color: var(--wood); text-transform: uppercase;
    padding: 10px 16px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .history-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--ink);
  }
  .history-table tr:hover td { background: var(--bg-soft); }
  .dl-link {
    color: var(--wood); text-decoration: none; font-size: 12px;
    font-family: var(--mono); margin-right: 12px;
  }
  .dl-link:hover { color: var(--wood-deep); text-decoration: underline; }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--ink-dim); font-size: 13px;
  }
  .empty-state a { color: var(--wood); text-decoration: none; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="mark">DÉBIT</span>
    <span class="name">Optimiseur</span>
  </div>
  <nav class="nav">
    <a href="/">Nouveau débit</a>
    <a href="/history.html" class="active">Historique</a>
  </nav>
</header>

<main class="wrap">
  <div class="lede">
    <h1>Historique</h1>
    <p>Exports précédents — lecture seule. Pour un nouveau calcul, <a href="/" style="color:var(--wood)">retourne à l'accueil</a>.</p>
  </div>

  <div class="stagebox" id="history-container">
    <div class="empty-state">Chargement…</div>
  </div>
</main>

<script src="/js/history.js"></script>
</body>
</html>
